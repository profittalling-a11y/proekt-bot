<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh}
        .header{background:#111827;padding:12px 24px;border-bottom:1px solid #1f2937;display:flex;justify-content:space-between;align-items:center}
        .header h1{font-size:18px;color:#60a5fa;font-weight:700}
        .header-right{display:flex;align-items:center;gap:12px}
        .status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e}
        .tabs{display:flex;background:#111827;border-bottom:1px solid #1f2937;overflow-x:auto}
        .tab{padding:10px 16px;cursor:pointer;font-size:12px;font-weight:600;color:#9ca3af;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
        .tab:hover{color:#e5e7eb;background:#1f2937}
        .tab.active{color:#60a5fa;border-bottom-color:#60a5fa;background:#1f2937}
        .tab.connected{color:#22c55e}
        .tab-icon{font-size:16px}
        .main{display:grid;grid-template-columns:1fr 320px;gap:0;min-height:calc(100vh - 90px)}
        .left-panel{padding:16px;overflow-y:auto}
        .right-panel{background:#111827;border-left:1px solid #1f2937;padding:16px;overflow-y:auto;display:flex;flex-direction:column}
        .exchange-info{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
        .metric{background:#1f2937;border-radius:8px;padding:12px;border:1px solid #374151}
        .metric-label{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
        .metric-value{font-size:20px;font-weight:700;margin-top:4px}
        .metric-value.positive{color:#22c55e}
        .metric-value.negative{color:#ef4444}
        .metric-value.neutral{color:#e5e7eb}
        .section-title{font-size:13px;font-weight:700;color:#60a5fa;margin-bottom:12px;display:flex;align-items:center;gap:6px}
        .bots-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
        .bot-slot{background:#1f2937;border:1px solid #374151;border-radius:8px;padding:12px}
        .bot-slot.running{border-color:#22c55e;box-shadow:0 0 12px rgba(34,197,94,.15)}
        .slot-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .slot-id{font-weight:700;font-size:12px;color:#60a5fa}
        .slot-dot{width:8px;height:8px;border-radius:50%;background:#4b5563}
        .slot-dot.active{background:#22c55e;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .slot-select{width:100%;background:#111827;border:1px solid #4b5563;border-radius:4px;padding:5px;color:#e5e7eb;font-size:11px;margin-bottom:8px}
        .slot-select:focus{outline:none;border-color:#60a5fa}
        .slot-controls{display:flex;gap:4px}
        .slot-controls button{flex:1;padding:5px;font-size:10px;font-weight:600;border:none;border-radius:4px;cursor:pointer}
        .btn-start{background:#16a34a;color:white}
        .btn-start:hover{background:#15803d}
        .btn-start:disabled{opacity:.3;cursor:not-allowed}
        .btn-stop{background:#dc2626;color:white}
        .btn-stop:hover{background:#b91c1c}
        .btn-stop:disabled{opacity:.3;cursor:not-allowed}
        .slot-status{margin-top:6px;font-size:10px;color:#6b7280;text-align:center;padding:4px;background:#111827;border-radius:4px}
        .slot-status.active{color:#22c55e;background:#052e16}
        .conn-section{background:#1f2937;border-radius:8px;padding:12px;margin-bottom:16px;border:1px solid #374151}
        .conn-row{display:flex;gap:8px;align-items:flex-end}
        .conn-row input{flex:1;background:#111827;border:1px solid #4b5563;border-radius:4px;padding:6px 8px;color:#e5e7eb;font-size:11px}
        .conn-row input:focus{outline:none;border-color:#60a5fa}
        .conn-row select{background:#111827;border:1px solid #4b5563;border-radius:4px;padding:6px 8px;color:#e5e7eb;font-size:11px}
        .conn-btn{padding:6px 12px;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer}
        .conn-btn.connect{background:#16a34a;color:white}
        .conn-btn.disconnect{background:#dc2626;color:white}
        .positions-table{width:100%;border-collapse:collapse;font-size:11px}
        .positions-table th{background:#111827;padding:8px;text-align:left;color:#6b7280;border-bottom:1px solid #374151}
        .positions-table td{padding:8px;border-bottom:1px solid #1f2937}
        .positive{color:#22c55e}
        .negative{color:#ef4444}
        .log-section{flex:1;display:flex;flex-direction:column}
        .log-title{font-size:13px;font-weight:700;color:#60a5fa;margin-bottom:8px}
        .log-container{flex:1;overflow-y:auto;background:#0a0e1a;border:1px solid #374151;border-radius:6px;padding:8px;font-family:'SF Mono',Consolas,monospace;font-size:10px}
        .log-entry{padding:4px 0;border-bottom:1px solid #1f2937;line-height:1.4}
        .log-time{color:#6b7280}
        .log-agent{font-weight:700}
        .log-agent.signal{color:#f59e0b}
        .log-agent.trade{color:#22c55e}
        .log-agent.system{color:#60a5fa}
        .log-msg{color:#d1d5db}
        .log-signal{color:#f59e0b}
        .log-buy{color:#22c55e}
        .log-sell{color:#ef4444}
        .webhook-url{font-family:monospace;font-size:10px;color:#60a5fa;background:#0a0e1a;padding:8px;border-radius:4px;margin-top:8px;word-break:break-all;border:1px solid #374151}
        .alert{padding:10px;border-radius:6px;margin-bottom:8px;font-size:12px}
        .alert-success{background:#065f46;color:#34d399}
        .alert-error{background:#7f1d1d;color:#fca5a5}
        .alert-info{background:#1e3a5f;color:#93c5fd}
    </style>
</head>
<body>
    <div class="header">
        <h1>Trading Bot Dashboard</h1>
        <div class="header-right">
            <div class="status-dot"></div>
            <span style="font-size:12px;color:#6b7280" id="clock"></span>
        </div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="main">
        <div class="left-panel">
            <div id="alert-container"></div>

            <!-- Exchange Info -->
            <div class="exchange-info" id="exchange-info">
                <div class="metric"><div class="metric-label">Balance</div><div class="metric-value neutral" id="m-balance">$0.00</div></div>
                <div class="metric"><div class="metric-label">Daily PnL</div><div class="metric-value neutral" id="m-daily">$0.00</div></div>
                <div class="metric"><div class="metric-label">Weekly PnL %</div><div class="metric-value neutral" id="m-weekly">0.00%</div></div>
                <div class="metric"><div class="metric-label">Open Positions</div><div class="metric-value neutral" id="m-positions">0</div></div>
            </div>

            <!-- Connection Form -->
            <div class="conn-section" id="conn-section">
                <div class="section-title">Connect Exchange</div>
                <div class="conn-row">
                    <input type="text" id="conn-api-key" placeholder="API Key">
                    <input type="password" id="conn-api-secret" placeholder="API Secret">
                    <input type="password" id="conn-passphrase" placeholder="Passphrase" style="display:none">
                    <select id="conn-mode"><option value="testnet">Testnet</option><option value="live">Live</option></select>
                    <button class="conn-btn connect" onclick="connectExchange()">Connect</button>
                    <button class="conn-btn disconnect" onclick="disconnectExchange()">Disconnect</button>
                </div>
            </div>

            <!-- Bot Slots -->
            <div class="section-title">Bot Slots</div>
            <div class="bots-grid" id="bots-grid"></div>

            <!-- Positions -->
            <div class="section-title">Open Positions</div>
            <table class="positions-table">
                <thead><tr><th>Symbol</th><th>Side</th><th>Size</th><th>Entry</th><th>PnL</th></tr></thead>
                <tbody id="positions-body"><tr><td colspan="5" style="text-align:center;color:#4b5563">No positions</td></tr></tbody>
            </table>
        </div>

        <div class="right-panel">
            <!-- Webhook -->
            <div style="margin-bottom:12px">
                <div class="section-title">TradingView Webhook</div>
                <div class="webhook-url" id="webhook-url">Loading...</div>
            </div>

            <!-- Agent Task Log -->
            <div class="log-section">
                <div class="log-title">Agent Task Log</div>
                <div class="log-container" id="log-container">
                    <div class="log-entry"><span class="log-time">--:--</span> <span class="log-agent system">SYSTEM</span> <span class="log-msg">Dashboard initialized</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const EXCHANGES = [
            {id:'okx',name:'OKX',icon:'🟢',passphrase:true,suffix:'-SWAP',sep:'-'},
            {id:'bybit',name:'Bybit',icon:'🟡',passphrase:false,suffix:'',sep:''},
            {id:'bingx',name:'BingX',icon:'🔵',passphrase:false,suffix:'',sep:'-'},
            {id:'gate',name:'Gate.io',icon:'🟣',passphrase:false,suffix:'',sep:'_'},
            {id:'bitget',name:'Bitget',icon:'🔴',passphrase:true,suffix:'',sep:''},
            {id:'weex',name:'Weex',icon:'🟠',passphrase:true,suffix:'',sep:'-'},
            {id:'toobit',name:'Toobit',icon:'⚪',passphrase:false,suffix:'',sep:''},
            {id:'pionex',name:'Pionex',icon:'⚫',passphrase:false,suffix:'',sep:'',disabled:true}
        ];
        const BASE_PAIRS = ['BTC','ETH','SOL','BNB','XRP','ADA','DOGE','AVAX','LINK','DOT','MATIC','UNI','ATOM','LTC','NEAR','FIL'];

        let activeTab = 'all';
        let connectedExchanges = {};
        let selectedExchange = null;
        let botSlots = Array.from({length:10},(_,i)=>({id:i+1,symbol:null,exchange:null,running:false,botId:null}));
        let logEntries = [];

        function formatPair(base, exchangeId) {
            const ex = EXCHANGES.find(e=>e.id===exchangeId);
            if(!ex||ex.disabled) return `${base}-USDT-SWAP`;
            if(ex.sep) return `${base}${ex.sep}USDT${ex.suffix}`;
            return `${base}USDT${ex.suffix}`;
        }

        function getConnectedExchangeId() {
            const keys = Object.keys(connectedExchanges);
            return keys.length > 0 ? keys[0] : null;
        }

        // Clock
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('ru-RU');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Tabs
        function renderTabs() {
            const allTab = [{id:'all',name:'All',icon:'📊'}];
            const exTabs = EXCHANGES.filter(ex=>!ex.disabled).map(ex=>({id:ex.id,name:ex.name,icon:ex.icon}));
            const tabs = [...allTab, ...exTabs];

            document.getElementById('tabs').innerHTML = tabs.map(t =>
                `<div class="tab${activeTab===t.id?' active':''}${connectedExchanges[t.id]?' connected':''}" onclick="switchTab('${t.id}')">
                    <span class="tab-icon">${t.icon}</span> ${t.name}
                </div>`
            ).join('');
        }

        function switchTab(id) {
            activeTab = id;
            if(id !== 'all') {
                selectedExchange = EXCHANGES.find(e=>e.id===id);
                if(selectedExchange) {
                    document.getElementById('conn-section').style.display = 'block';
                    document.getElementById('conn-passphrase').style.display = selectedExchange.passphrase ? 'block' : 'none';
                    document.getElementById('conn-api-key').value = connectedExchanges[id]?.apiKey || '';
                    document.getElementById('conn-api-secret').value = '';
                    document.getElementById('conn-passphrase').value = '';
                }
            } else {
                document.getElementById('conn-section').style.display = 'none';
                selectedExchange = null;
            }
            renderTabs();
            renderBotSlots();
            updateMetrics();
        }

        // Metrics
        function updateMetrics() {
            const connId = getConnectedExchangeId();
            if(connId) {
                loadBalance(connId);
                loadPositions();
            }
        }

        async function loadBalance(exchangeId) {
            try {
                const r = await fetch(`/api/exchange/balance?exchange=${exchangeId}`);
                const res = await r.json();
                if(res.success) {
                    const bal = res.data.balance;
                    document.getElementById('m-balance').textContent = `$${bal.toFixed(2)}`;
                    document.getElementById('m-balance').className = 'metric-value neutral';
                }
            } catch(e) {}
        }

        async function loadPositions() {
            try {
                const r = await fetch('/api/positions/all');
                const res = await r.json();
                if(res.success && res.data) {
                    document.getElementById('m-positions').textContent = res.data.length;
                    const totalPnl = res.data.reduce((s,p) => s + (p.pnl||p.unrealized_pnl||0), 0);
                    const el = document.getElementById('m-daily');
                    el.textContent = `$${totalPnl.toFixed(2)}`;
                    el.className = `metric-value ${totalPnl>=0?'positive':'negative'}`;

                    const tb = document.getElementById('positions-body');
                    if(!res.data.length) {
                        tb.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#4b5563">No positions</td></tr>';
                        return;
                    }
                    tb.innerHTML = res.data.map(p => {
                        const pnl = p.pnl||p.unrealized_pnl||0;
                        return `<tr>
                            <td style="font-weight:600">${p.symbol}</td>
                            <td><span style="padding:2px 6px;border-radius:3px;font-size:10px;background:${p.side==='Buy'?'#065f46':'#7f1d1d'};color:${p.side==='Buy'?'#34d399':'#fca5a5'}">${p.side==='Buy'?'LONG':'SHORT'}</span></td>
                            <td>${p.size}</td>
                            <td>$${p.entry_price}</td>
                            <td class="${pnl>=0?'positive':'negative'}">$${pnl.toFixed(2)}</td>
                        </tr>`;
                    }).join('');
                }
            } catch(e) {}
        }

        // Connection
        async function connectExchange() {
            if(!selectedExchange) { showAlert('Select an exchange tab first', 'error'); return; }
            const apiKey = document.getElementById('conn-api-key').value.trim();
            const apiSecret = document.getElementById('conn-api-secret').value.trim();
            const passphrase = document.getElementById('conn-passphrase').value.trim();
            const mode = document.getElementById('conn-mode').value;
            if(!apiKey||!apiSecret) { showAlert('Enter API Key and Secret', 'error'); return; }
            if(selectedExchange.passphrase && !passphrase) { showAlert(`${selectedExchange.name} requires Passphrase`, 'error'); return; }
            try {
                const r = await fetch('/api/exchange/connect', {method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({exchange:selectedExchange.id, api_key:apiKey, api_secret:apiSecret, passphrase, testnet:mode==='testnet'})});
                const res = await r.json();
                if(res.success) {
                    connectedExchanges[selectedExchange.id] = {apiKey, mode};
                    showAlert(`${selectedExchange.name} connected`, 'success');
                    addLog('system', `${selectedExchange.name} connected (${mode})`);
                    renderTabs();
                    renderBotSlots();
                    updateMetrics();
                } else {
                    showAlert(res.error||'Failed', 'error');
                }
            } catch(e) { showAlert('Connection error', 'error'); }
        }

        async function disconnectExchange() {
            if(!selectedExchange) return;
            try {
                await fetch('/api/exchange/disconnect', {method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({exchange:selectedExchange.id})});
                delete connectedExchanges[selectedExchange.id];
                showAlert(`${selectedExchange.name} disconnected`, 'info');
                addLog('system', `${selectedExchange.name} disconnected`);
                renderTabs();
                renderBotSlots();
                updateMetrics();
            } catch(e) {}
        }

        // Bot Slots
        function renderBotSlots() {
            const connId = getConnectedExchangeId();
            const grid = document.getElementById('bots-grid');
            if(!grid) return;
            grid.innerHTML = botSlots.map(s => {
                const displaySymbol = s.symbol ? formatPair(s.symbol.replace(/-USDT-SWAP/g,'').replace(/USDT.*$/,'').replace(/[-_]/g,''), connId||'okx') : '';
                return `
                <div class="bot-slot${s.running?' running':''}">
                    <div class="slot-header">
                        <span class="slot-id">#${s.id}</span>
                        <div class="slot-dot${s.running?' active':''}"></div>
                    </div>
                    <select class="slot-select" onchange="setBotPair(${s.id},this.value)">
                        <option value="">Select pair...</option>
                        ${BASE_PAIRS.map(b => {
                            const canonical = `${b}-USDT-SWAP`;
                            const display = connId ? formatPair(b, connId) : canonical;
                            return `<option value="${canonical}"${s.symbol===canonical?' selected':''}>${display}</option>`;
                        }).join('')}
                    </select>
                    <div class="slot-controls">
                        <button class="btn-start" onclick="startBot(${s.id})"${!s.symbol||s.running||!connId?' disabled':''}>Start</button>
                        <button class="btn-stop" onclick="stopBot(${s.id})"${!s.running?' disabled':''}>Stop</button>
                    </div>
                    <div class="slot-status${s.running?' active':''}">${s.running?`Running: ${displaySymbol}`:(s.symbol?displaySymbol:'Idle')}</div>
                </div>`;
            }).join('');
        }

        function setBotPair(slotId, canonicalPair) {
            const slot = botSlots[slotId - 1];
            slot.symbol = canonicalPair || null;
            slot.exchange = canonicalPair ? getConnectedExchangeId() : null;
            renderBotSlots();
        }

        async function startBot(slotId) {
            const s = botSlots[slotId-1];
            if(!s.symbol) { showAlert('Select a pair', 'error'); return; }
            const connId = getConnectedExchangeId();
            if(!connId) { showAlert('Connect to an exchange first', 'error'); return; }
            s.exchange = connId;
            const displaySymbol = formatPair(s.symbol.replace(/-USDT-SWAP/g,'').replace(/USDT.*$/,'').replace(/[-_]/g,''), connId);
            try {
                const r = await fetch('/api/multibot/start', {method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({exchange:s.exchange, symbol:s.symbol, timeframe:15, supertrend_multiplier:3.0})});
                const res = await r.json();
                if(res.success) {
                    s.running = true; s.botId = res.bot_id;
                    renderBotSlots();
                    showAlert(`Bot #${slotId} started: ${displaySymbol}`, 'success');
                    addLog('trade', `Bot #${slotId} START ${displaySymbol}`);
                } else {
                    showAlert(res.error||'Failed', 'error');
                    addLog('system', `Bot #${slotId} FAILED: ${res.error||'unknown'}`);
                }
            } catch(e) { showAlert('Error', 'error'); }
        }

        async function stopBot(slotId) {
            const s = botSlots[slotId-1];
            if(!s.botId) return;
            try {
                await fetch('/api/multibot/stop', {method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({bot_id:s.botId})});
                const displaySymbol = s.symbol ? formatPair(s.symbol.replace(/-USDT-SWAP/g,'').replace(/USDT.*$/,'').replace(/[-_]/g,''), getConnectedExchangeId()||'okx') : '';
                s.running = false; s.botId = null;
                renderBotSlots();
                showAlert(`Bot #${slotId} stopped`, 'success');
                addLog('trade', `Bot #${slotId} STOP ${displaySymbol}`);
            } catch(e) {}
        }

        // Agent Task Log
        function addLog(agent, message) {
            const time = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${time}</span> <span class="log-agent ${agent}">${agent.toUpperCase()}</span> <span class="log-msg">${message}</span>`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            logEntries.push({time, agent, message});
            if(logEntries.length > 100) logEntries.shift();
        }

        // Simulate agent signals (for demo)
        function simulateSignal() {
            const connId = getConnectedExchangeId();
            if(!connId) return;
            const bases = ['BTC','ETH','SOL'];
            const base = bases[Math.floor(Math.random()*bases.length)];
            const direction = Math.random() > 0.5 ? 'BUY' : 'SELL';
            const price = (Math.random()*50000+1000).toFixed(2);
            addLog('signal', `Supertrend ${direction} ${formatPair(base, connId)} @ $${price}`);
            setTimeout(() => {
                addLog('trade', `Agent executing ${direction} ${formatPair(base, connId)}`);
            }, 1500);
        }
        setInterval(simulateSignal, 15000);

        // Init
        async function loadConnectionsFromServer() {
            try {
                const r = await fetch('/api/exchange/connections');
                const res = await r.json();
                if(res.success && res.data) {
                    connectedExchanges = {};
                    for(const [ex, info] of Object.entries(res.data)) {
                        connectedExchanges[ex] = {mode: info.testnet?'testnet':'live'};
                    }
                }
            } catch(e) {}
            renderTabs();
            renderBotSlots();
            document.getElementById('conn-section').style.display = 'none';
            document.getElementById('webhook-url').textContent = `http://${window.location.host}/tradingview/webhook`;
            addLog('system', 'Dashboard loaded');
        }

        function showAlert(msg, type='info') {
            const c = document.getElementById('alert-container');
            const a = document.createElement('div');
            a.className = `alert alert-${type}`;
            a.textContent = msg;
            c.appendChild(a);
            setTimeout(() => a.remove(), 4000);
        }

        loadConnectionsFromServer();
        setInterval(loadPositions, 5000);
    </script>
</body>
</html>
